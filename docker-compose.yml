# =============================================================
# docker-compose.yml — Environnement de développement Docker
# Usage : docker-compose up
# =============================================================

version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Named volume pour la base SQLite (évite le problème du fichier manquant)
      - ikliloune_db:/app/ikliloune.db
      # Persister les images produits uploadées
      - ./static/images/produits:/app/static/images/produits
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ikliloune_db:
